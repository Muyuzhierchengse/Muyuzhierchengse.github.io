<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Zhimu Yang</title>
    
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #fcfbf9;
        color: #2a2a2a;
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
    }

    .global-nav {
        width: 100%;
        max-width: 900px;
        padding: 40px 20px 20px 20px;
        display: flex;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
        opacity: 0;
        transform: translateY(15px);
        /* 延迟至 3.8s，等待花朵动画结束 */
        animation: navReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 3.8s forwards;
    }

    .global-nav a {
        text-decoration: none;
        color: #888;
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        padding-bottom: 4px;
        border-bottom: 1px solid transparent;
        transition: all 0.4s ease;
    }

    .global-nav a:hover, .global-nav a.active {
        color: #111;
        border-bottom-color: #111;
    }

    @keyframes navReveal {
        to { opacity: 1; transform: translateY(0); }
    }

    /* 修复居中：使用 fixed 定位确保花朵不受页面流影响，绝对居于屏幕中心 */
    .intro-flower-container {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 240px;
        height: 240px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        /* 退场时间延后，给足复杂图形绘制的时间 */
        animation: smoothFadeOut 1.5s cubic-bezier(0.33, 1, 0.68, 1) 3.6s forwards;
    }

    .intro-flower {
        width: 100%;
        height: 100%;
        overflow: visible;
    }

    /* 单朵小花的漫游入场 */
    .floret {
        opacity: 0;
        /* 引入 --scale 控制大小层级，让花球更有立体感 */
        animation: wanderIn 2.2s cubic-bezier(0.25, 1, 0.4, 1) var(--delay) forwards;
    }

    .floret path {
        fill: none;
        stroke: #4a4a4a;
        stroke-width: 0.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 260;
        stroke-dashoffset: 260;
        animation: drawFloret 2.2s cubic-bezier(0.25, 1, 0.5, 1) var(--delay) forwards;
    }

    @keyframes wanderIn {
        0% { 
            transform: translate(var(--startX), var(--startY)) rotate(calc(var(--endR) - 90deg)) scale(0.1); 
            opacity: 0; 
        }
        20% { opacity: 1; }
        100% { 
            transform: translate(var(--endX), var(--endY)) rotate(var(--endR)) scale(var(--scale)); 
            opacity: 1; 
        }
    }

    @keyframes drawFloret {
        to { stroke-dashoffset: 0; }
    }

    @keyframes smoothFadeOut {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
        100% { opacity: 0; transform: translate(-50%, -55%) scale(1.03); filter: blur(1px); } 
    }

    .home-container {
        max-width: 640px;
        width: 100%;
        text-align: center;
        padding: 40px 20px;
        opacity: 0;
        transform: translateY(10px);
        /* 主内容延迟至 4.1s 出现 */
        animation: contentReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 4.1s forwards;
    }

    @keyframes contentReveal {
        to { opacity: 1; transform: translateY(0); }
    }

    .avatar { width: 104px; height: 104px; border-radius: 50%; object-fit: cover; filter: grayscale(30%) contrast(1.1); margin-bottom: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.03); }
    .name { font-size: 22px; letter-spacing: 6px; text-transform: uppercase; margin: 0 0 12px 0; font-weight: normal; color: #1a1a1a; }
    .description { font-size: 15px; font-style: italic; color: #666; margin-bottom: 30px; }
    .divider { font-size: 16px; color: #ccc; letter-spacing: 8px; margin: 30px 0 40px 0; user-select: none; }
    .social-links { margin-bottom: 50px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .social-links a { color: #777; text-decoration: none; margin: 0 12px; transition: color 0.4s ease; }
    .social-links a:hover { color: #111; }
    
    .home-footer {
        margin-top: 90px;
        text-align: center;
        /* 启用古典学术文献专属的衬线字体栈 */
        font-family: "EB Garamond", Garamond, Baskerville, "Hoefler Text", "Times New Roman", serif;
        font-size: 16px; /* 略微调大，让衬线（Serif）的笔锋细节更清晰 */
        font-style: italic; /* 学术引用和铭文的标准排版 */
        color: #555; /* 降低纯黑的锐利感，模拟古典墨迹 */
        letter-spacing: 1.5px;
    }
</style>

</head>

<!-- 全新设计的复杂版紫阳花，11朵小花互相交织 -->
<div class="intro-flower-container">

    <svg class="intro-flower" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
        
        <!-- Center -->

            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>

            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>

            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>
        <!-- Left -->

        </g>
        <!-- Bottom Left -->
        <g class="floret" style="--startX: -50px; --startY: 150px; --endX: -20px; --endY: 26px; --endR: 65deg; --scale: 0.7; --delay: 0.65s;">
            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>
        <!-- Bottom Right -->
        <g class="floret" style="--startX: 100px; --startY: 150px; --endX: 22px; --endY: 24px; --endR: -50deg; --scale: 0.75; --delay: 0.75s;">
            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>
        <!-- Outer Top -->
        <g class="floret" style="--startX: 0px; --startY: -180px; --endX: 2px; --endY: -38px; --endR: 10deg; --scale: 0.55; --delay: 0.85s;">
            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>
        <!-- Outer Bottom -->
        <g class="floret" style="--startX: 0px; --startY: 180px; --endX: -2px; --endY: 40px; --endR: 80deg; --scale: 0.6; --delay: 0.95s;">
            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>
        <!-- Inner Filler 1 -->
        <g class="floret" style="--startX: -100px; --startY: 0px; --endX: -12px; --endY: -2px; --endR: 30deg; --scale: 0.5; --delay: 1.05s;">
            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>
        <!-- Inner Filler 2 -->
        <g class="floret" style="--startX: 100px; --startY: 0px; --endX: 14px; --endY: 8px; --endR: -10deg; --scale: 0.5; --delay: 1.1s;">
            <path d="M0,0 C-12,-10 -12,-25 0,-30 C12,-25 12,-10 0,0 M0,0 C10,-12 25,-12 30,0 C25,12 10,12 0,0 M0,0 C12,10 12,25 0,30 C-12,25 -12,10 0,0 M0,0 C-10,12 -25,12 -30,0 C-25,-12 -10,-12 0,0" />
        </g>
    </svg>
